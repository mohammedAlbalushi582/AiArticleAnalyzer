server {
    listen 80;
    server_name thearticleanalyzer.com www.thearticleanalyzer.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name thearticleanalyzer.com www.thearticleanalyzer.com;

    ssl_certificate /etc/letsencrypt/live/thearticleanalyzer.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thearticleanalyzer.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI analysis (URL fetch + Gemini, with retries) can take a while.
        # nginx's 60s default would return a 504 HTML page the frontend can't
        # parse as JSON. Keep this above the backend's worst-case so Django
        # always gets to return a JSON response (success or error).
        proxy_connect_timeout 75s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
